# PURE_RANDOM experiment config (tree policy random). Combine with PURE_RANDOM=1.
# Usage:
#   PURE_RANDOM=1 python run_experiment.py --config src/deagent/config/exp_pure_random.yaml --run-id pure_random

model:
  openai_api_key: ""
  base_url: ""
  max_retry_number: 10

log:
  log_dir: 'ProjectCodeWithColors'

problem_oriented_enhancement:
  enable_enhanced_ucb: true
  potential_weight: 0.3
  similarity_threshold: 0.3
  max_potential_boost: 2.0
  problem_parsing_enabled: true
  debug_mode: true

mcts_tree:
  max_child_number: 16
  max_depth: 6
  new_ucb_weight: 10
  beta: 0.5
  min_agent_ratio: 0.4
  max_tools_per_node: 10
  sim_agent_bias: 0.55
  enable_coloring: false

ablation:
  agent_only: false
  minimal_tool_pool: false
  minimal_tool_set:
    - syntax_error_checker
    - undefined_name_checker
    - dependency_extractor
    - code_summarizer
    - test_runner
